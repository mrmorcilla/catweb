<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ColorCode PRO Final</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

video, canvas {
    border: 2px solid white;
    margin-top: 10px;
}

input {
    margin-top: 10px;
    padding: 5px;
    font-size: 16px;
}

button {
    padding: 6px 12px;
    font-size: 16px;
    cursor: pointer;
}

#resultado {
    font-size: 22px;
    margin-top: 10px;
    color: #00ffcc;
}
</style>
</head>
<body>

<h2>🎨 Generador + Scanner Lineal</h2>

<input id="input" placeholder="Ej: 10100">
<button onclick="generar()">Generar</button>

<br>

<canvas id="codigo" width="400" height="100"></canvas>

<br>

<video id="video" width="400" height="300" autoplay></video>
<canvas id="scan" width="400" height="300"></canvas>

<div id="resultado">Esperando lectura...</div>

<script>
// ================= GENERADOR =================
function generar() {
    const texto = document.getElementById("input").value;
    const canvas = document.getElementById("codigo");
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let x = 10;
    const size = 20;

    function dibujar(color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, 20, size, 60);
        x += size;
    }

    // 🔴 inicio
    dibujar("red");

    for (let bit of texto) {
        dibujar("black"); // separador

        if (bit === "1") {
            dibujar("white");
        } else {
            dibujar("black");
        }
    }

    dibujar("black");
    dibujar("red"); // 🔴 fin
}

// ================= SCANNER =================
const video = document.getElementById("video");
const canvasScan = document.getElementById("scan");
const ctxScan = canvasScan.getContext("2d");
const resultado = document.getElementById("resultado");

// cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(() => alert("Error cámara"));

// detección color
function esRojo(r,g,b){ return r>150 && g<80 && b<80; }
function esNegro(r,g,b){ return r<60 && g<60 && b<60; }
function esBlanco(r,g,b){ return r>180 && g>180 && b>180; }

function escanear() {
    ctxScan.drawImage(video, 0, 0, canvasScan.width, canvasScan.height);

    const y = Math.floor(canvasScan.height / 2);
    const img = ctxScan.getImageData(0, y, canvasScan.width, 1);
    const data = img.data;

    // línea guía
    ctxScan.strokeStyle = "lime";
    ctxScan.beginPath();
    ctxScan.moveTo(0, y);
    ctxScan.lineTo(canvasScan.width, y);
    ctxScan.stroke();

    let centro = Math.floor(canvasScan.width / 2);

    // buscar rojo inicial
    let inicio = -1;
    for (let x = centro; x >= 0; x--) {
        let i = x * 4;
        if (esRojo(data[i], data[i+1], data[i+2])) {
            inicio = x;
            break;
        }
    }

    if (inicio === -1) {
        resultado.innerText = "No detecto inicio";
        requestAnimationFrame(escanear);
        return;
    }

    let bits = "";
    let leyendo = false;
    let ultimoFueBlanco = false;

    for (let x = inicio; x < canvasScan.width; x++) {
        let i = x * 4;
        let r = data[i], g = data[i+1], b = data[i+2];

        if (esRojo(r,g,b) && leyendo) break;

        if (esBlanco(r,g,b)) {
            if (!ultimoFueBlanco) {
                bits += "1";
                ultimoFueBlanco = true;
                leyendo = true;
            }
        } else if (esNegro(r,g,b)) {
            if (leyendo && ultimoFueBlanco) {
                bits += "0";
                ultimoFueBlanco = false;
            }
        }
    }

    resultado.innerText = bits || "Leyendo...";
    requestAnimationFrame(escanear);
}

video.addEventListener("play", escanear);
</script>

</body>
</html>
