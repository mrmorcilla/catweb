<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ColorCode Preciso</title>

<style>
body {
    background: #f5f5f5;
    color: black;
    text-align: center;
    font-family: Arial;
}

video, canvas {
    border: 2px solid black;
    margin-top: 10px;
}

input, button {
    margin-top: 10px;
    padding: 6px;
    font-size: 16px;
}

#raw {
    font-size: 18px;
    margin-top: 10px;
}

#final {
    font-size: 26px;
    margin-top: 5px;
    color: green;
}
</style>
</head>
<body>

<h2>🧪 Generador + Scanner Estable</h2>

<input id="input" placeholder="Ej: 10100">
<button onclick="generar()">Generar</button>

<br>
<canvas id="codigo" width="500" height="100"></canvas>

<br>

<video id="video" width="500" height="300" autoplay></video>
<canvas id="scan" width="500" height="300"></canvas>

<div id="raw">Lectura actual: -</div>
<div id="final">Promedio: -</div>

<script>
// ================= GENERADOR =================
function generar() {
    const texto = document.getElementById("input").value;
    const canvas = document.getElementById("codigo");
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let x = 20;
    const w = 20;

    function draw(color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, 20, w, 60);
        x += w;
    }

    draw("green"); // inicio

    for (let bit of texto) {
        draw("black"); // separador

        if (bit === "1") draw("red");
        else draw("white");
    }

    draw("black");
    draw("green"); // fin
}

// ================= SCANNER =================
const video = document.getElementById("video");
const canvasScan = document.getElementById("scan");
const ctx = canvasScan.getContext("2d");

const rawText = document.getElementById("raw");
const finalText = document.getElementById("final");

navigator.mediaDevices.getUserMedia({ video: true })
.then(s => video.srcObject = s)
.catch(() => alert("Error cámara"));

// detección flexible (no exacta)
function esVerde(r,g,b){ return g > 120 && r < 100 && b < 100; }
function esNegro(r,g,b){ return r < 70 && g < 70 && b < 70; }
function esRojo(r,g,b){ return r > 120 && g < 100 && b < 100; }
function esBlanco(r,g,b){ return r > 180 && g > 180 && b > 180; }

// historial para promedio
let historial = [];

function escanear() {
    ctx.drawImage(video,0,0,canvasScan.width,canvasScan.height);

    const y = canvasScan.height / 2 | 0;
    const img = ctx.getImageData(0,y,canvasScan.width,1).data;

    // línea guía
    ctx.strokeStyle = "blue";
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvasScan.width,y);
    ctx.stroke();

    let centro = canvasScan.width / 2 | 0;

    // buscar verde
    let start = -1;
    for (let x=centro; x>=0; x--) {
        let i = x*4;
        if (esVerde(img[i],img[i+1],img[i+2])) {
            start = x;
            break;
        }
    }

    if (start === -1) {
        rawText.innerText = "Lectura actual: buscando...";
        requestAnimationFrame(escanear);
        return;
    }

    let bits = "";
    let lastColor = null;
    let leyendo = false;

    for (let x=start; x<canvasScan.width; x++) {
        let i = x*4;
        let r=img[i], g=img[i+1], b=img[i+2];

        let color = null;

        if (esVerde(r,g,b)) {
            if (leyendo) break;
            color = "start";
        }
        else if (esNegro(r,g,b)) color = "sep";
        else if (esRojo(r,g,b)) color = "1";
        else if (esBlanco(r,g,b)) color = "0";

        if (!color) continue;

        // 🔥 CLAVE: solo cambios de color
        if (color !== lastColor) {

            if (color === "1") {
                bits += "1";
                leyendo = true;
            }

            if (color === "0") {
                bits += "0";
                leyendo = true;
            }

            lastColor = color;
        }
    }

    rawText.innerText = "Lectura actual: " + (bits || "-");

    // promedio por frecuencia
    if (bits.length > 0) {
        historial.push(bits);
        if (historial.length > 20) historial.shift();

        let conteo = {};
        for (let b of historial) {
            conteo[b] = (conteo[b]||0)+1;
        }

        let mejor = Object.entries(conteo).sort((a,b)=>b[1]-a[1])[0];
        finalText.innerText = "Promedio: " + (mejor ? mejor[0] : "-");
    }

    requestAnimationFrame(escanear);
}

video.addEventListener("play", escanear);
</script>

</body>
</html>
