<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scanner Lineal PRO</title>
<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

video, canvas {
    border: 2px solid white;
    margin-top: 10px;
}

#resultado {
    font-size: 24px;
    margin-top: 15px;
    color: #00ffcc;
}
</style>
</head>
<body>

<h2>📷 Scanner de Código por Colores</h2>

<video id="video" width="400" height="300" autoplay></video>
<canvas id="canvas" width="400" height="300"></canvas>

<div id="resultado">Esperando lectura...</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const resultado = document.getElementById("resultado");

// Iniciar cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Error al abrir cámara");
});

// Función para detectar colores
function esRojo(r, g, b) {
    return r > 150 && g < 80 && b < 80;
}

function esNegro(r, g, b) {
    return r < 60 && g < 60 && b < 60;
}

function esBlanco(r, g, b) {
    return r > 180 && g > 180 && b > 180;
}

// Escaneo principal
function escanear() {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const y = Math.floor(canvas.height / 2);
    const img = ctx.getImageData(0, y, canvas.width, 1);
    const data = img.data;

    // Dibujar línea guía
    ctx.strokeStyle = "lime";
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();

    let centro = Math.floor(canvas.width / 2);

    // 🔍 Buscar primer rojo desde el centro hacia la izquierda
    let inicio = -1;
    for (let x = centro; x >= 0; x--) {
        let i = x * 4;
        let r = data[i], g = data[i+1], b = data[i+2];

        if (esRojo(r,g,b)) {
            inicio = x;
            break;
        }
    }

    if (inicio === -1) {
        resultado.innerText = "No detecto inicio";
        requestAnimationFrame(escanear);
        return;
    }

    // 👉 Ahora recorrer hacia la derecha
    let bits = "";
    let leyendo = false;

    for (let x = inicio; x < canvas.width; x++) {
        let i = x * 4;
        let r = data[i], g = data[i+1], b = data[i+2];

        if (esRojo(r,g,b) && leyendo) {
            break; // fin del código
        }

        if (esBlanco(r,g,b)) {
            bits += "1";
            leyendo = true;
        }

        if (esNegro(r,g,b)) {
            if (leyendo) bits += "0";
        }
    }

    resultado.innerText = bits || "Leyendo...";

    requestAnimationFrame(escanear);
}

video.addEventListener("play", () => {
    escanear();
});
</script>

</body>
</html>
