<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barcode Casero PRO</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

#contenedor {
    position: relative;
    display: inline-block;
}

#video {
    width: 400px;
    border: 2px solid white;
}

#linea {
    position: absolute;
    width: 100%;
    height: 2px;
    background: red;
    top: 50%;
    left: 0;
}

canvas {
    margin-top: 20px;
    border: 1px solid white;
}

button, input {
    margin-top: 10px;
    padding: 6px;
}
</style>
</head>
<body>

<h2>📸 Escáner de Barras Casero</h2>

<div id="contenedor">
    <video id="video" autoplay playsinline></video>
    <div id="linea"></div>
</div>

<br>
<button onclick="cambiarCamara()">🔄 Cambiar cámara</button>

<p>Detectado: <span id="resultado">---</span></p>

<input id="texto" placeholder="Ej: 010101">
<button onclick="generar()">Generar</button>

<canvas id="canvasCodigo" width="500" height="100"></canvas>

<script>
let video = document.getElementById("video");
let resultado = document.getElementById("resultado");

let canvasScan = document.createElement("canvas");
let ctxScan = canvasScan.getContext("2d");

let usandoTrasera = true;
let streamActual = null;

// INICIAR CÁMARA
async function iniciarCamara(){
    if(streamActual){
        streamActual.getTracks().forEach(t => t.stop());
    }

    try {
        let stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: usandoTrasera ? { exact: "environment" } : "user"
            }
        });
        streamActual = stream;
        video.srcObject = stream;
    } catch(e){
        // fallback
        let stream = await navigator.mediaDevices.getUserMedia({ video: true });
        streamActual = stream;
        video.srcObject = stream;
    }
}

// CAMBIAR CÁMARA
function cambiarCamara(){
    usandoTrasera = !usandoTrasera;
    iniciarCamara();
}

// DETECCIÓN DE COLOR
function detectarColor(r,g,b){
    if(r>200 && g>200 && b>200) return "blanco";
    if(r<80 && g<80 && b<80) return "negro";
    if(g>120 && r<100 && b<100) return "verde";
    return "otro";
}

// PROMEDIO DE BLOQUE
function promedioColor(data){
    let r=0,g=0,b=0;
    let total = data.length/4;

    for(let i=0;i<data.length;i+=4){
        r += data[i];
        g += data[i+1];
        b += data[i+2];
    }

    return [r/total, g/total, b/total];
}

// ESCÁNER
function escanear(){
    if(video.videoWidth === 0) {
        requestAnimationFrame(escanear);
        return;
    }

    canvasScan.width = video.videoWidth;
    canvasScan.height = video.videoHeight;

    ctxScan.drawImage(video, 0, 0);

    let y = canvasScan.height/2;
    let ancho = 30;

    let resultadoFinal = "";

    for(let x=0; x<canvasScan.width; x+=ancho){

        let bloque = ctxScan.getImageData(x, y, ancho, 10).data;
        let [r,g,b] = promedioColor(bloque);

        let color = detectarColor(r,g,b);

        if(color === "negro") resultadoFinal += "0";
        if(color === "verde") resultadoFinal += "1";
        // blanco = separador
    }

    resultado.textContent = resultadoFinal || "---";

    requestAnimationFrame(escanear);
}

video.addEventListener("play", escanear);

// GENERADOR
function generar(){
    let texto = document.getElementById("texto").value;
    let canvas = document.getElementById("canvasCodigo");
    let ctx = canvas.getContext("2d");

    let ancho = 30;
    let x = 0;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let char of texto){

        let color;

        if(char === "0") color = "black";
        else if(char === "1") color = "green";
        else continue;

        // barra de dato
        ctx.fillStyle = color;
        ctx.fillRect(x, 0, ancho, canvas.height);

        x += ancho;

        // separador blanco (clave)
        ctx.fillStyle = "white";
        ctx.fillRect(x, 0, ancho, canvas.height);

        x += ancho;
    }
}

// iniciar automáticamente
iniciarCamara();
</script>

</body>
</html>
