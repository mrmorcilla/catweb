<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ColorCode</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #canvas {
      margin-top: 20px;
      border: 2px solid white;
    }

    input {
      padding: 10px;
      font-size: 18px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🎨 ColorCode Generator</h1>

<input id="inputText" placeholder="Ingresa números (0-9)" />
<br>
<button onclick="generar()">Generar</button>
<button onclick="decodificar()">Decodificar</button>

<br>
<canvas id="canvas" width="800" height="100"></canvas>

<p id="output"></p>

<script>
const colores = {
  rojo: "#ff0000",
  verde: "#00ff00",
  azul: "#0000ff",
  negro: "#000000",
  blanco: "#ffffff"
};

// Diccionario (pares de colores)
const diccionario = {
  "negro-blanco": "0",
  "negro-rojo": "1",
  "negro-verde": "2",
  "negro-azul": "3",
  "blanco-rojo": "4",
  "blanco-verde": "5",
  "blanco-azul": "6",
  "rojo-verde": "7",
  "rojo-azul": "8",
  "verde-azul": "9"
};

// Invertido
const diccionarioInv = {};
for (let key in diccionario) {
  diccionarioInv[diccionario[key]] = key;
}

// Patrones especiales
const START = ["blanco", "rojo", "blanco"];
const END = ["verde", "negro", "verde"];

function generar() {
  const texto = document.getElementById("inputText").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let secuencia = [...START];

  for (let char of texto) {
    if (!diccionarioInv[char]) continue;
    let [c1, c2] = diccionarioInv[char].split("-");
    secuencia.push(c1, c2);
  }

  secuencia.push(...END);

  const ancho = 20;

  for (let i = 0; i < secuencia.length; i++) {
    ctx.fillStyle = colores[secuencia[i]];
    ctx.fillRect(i * ancho, 0, ancho, canvas.height);
  }
}

function decodificar() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const ancho = 20;
  const cantidad = canvas.width / ancho;

  let coloresLeidos = [];

  for (let i = 0; i < cantidad; i++) {
    const data = ctx.getImageData(i * ancho + 1, 10, 1, 1).data;
    const hex = rgbToHex(data[0], data[1], data[2]);
    coloresLeidos.push(hexToNombre(hex));
  }

  // Quitar inicio y final
  coloresLeidos = coloresLeidos.slice(3, -3);

  let resultado = "";

  for (let i = 0; i < coloresLeidos.length; i += 2) {
    let clave = coloresLeidos[i] + "-" + coloresLeidos[i + 1];
    if (diccionario[clave]) {
      resultado += diccionario[clave];
    }
  }

  document.getElementById("output").innerText = "Resultado: " + resultado;
}

function rgbToHex(r, g, b) {
  return "#" + [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
}

function hexToNombre(hex) {
  for (let key in colores) {
    if (colores[key] === hex) return key;
  }
  return "desconocido";
}
</script>

</body>
</html>
