<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Color Code v3</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }
  canvas, video {
    border: 2px solid white;
    margin-top: 10px;
  }
  input {
    margin-top: 10px;
    font-size: 18px;
    padding: 5px;
  }
</style>
</head>
<body>

<h2>🎨 Generador + Scanner de Barras</h2>

<input id="texto" placeholder="Ej: 634129">
<button onclick="generar()">Generar</button>

<br>

<canvas id="gen" width="400" height="100"></canvas>

<br>

<video id="video" width="400" height="200" autoplay></video>
<canvas id="scan" width="400" height="200"></canvas>

<p>Resultado: <span id="output">...</span></p>

<script>
// 🎨 COLORES
const colores = {
  "0":[0,0,0],
  "1":[255,255,255],
  "2":[255,0,0],
  "3":[0,255,0],
  "4":[0,0,255],
  "5":[255,255,0],
  "6":[0,255,255],
  "7":[255,0,255]
};

// 📏 CONFIG
const SEPARADOR = 4; // espacio entre barras
const ALTURA = 100;

// 🎨 GENERADOR
function generar() {
  let texto = document.getElementById("texto").value;
  let canvas = document.getElementById("gen");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let anchoTotal = canvas.width;
  let anchoBarra = (anchoTotal / texto.length) * 0.6;

  let x = 0;

  for (let i = 0; i < texto.length; i++) {
    let num = texto[i];
    let color = colores[num] || [100,100,100];

    ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;

    ctx.fillRect(x, 0, anchoBarra, ALTURA);

    x += anchoBarra + SEPARADOR;
  }
}

// 📷 SCANNER
const video = document.getElementById("video");
const canvas = document.getElementById("scan");
const ctx = canvas.getContext("2d");
const output = document.getElementById("output");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// distancia color
function dist(a,b){
  return Math.sqrt(
    (a[0]-b[0])**2 +
    (a[1]-b[1])**2 +
    (a[2]-b[2])**2
  );
}

function detectar(rgb){
  let min = Infinity;
  let elegido = "?";

  for (let k in colores){
    let d = dist(rgb, colores[k]);
    if (d < min){
      min = d;
      elegido = k;
    }
  }
  return elegido;
}

function scan(){
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  let y = canvas.height/2;

  // 🔴 línea guía
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(0,y);
  ctx.lineTo(canvas.width,y);
  ctx.stroke();

  let resultado = "";

  let anchoEstimado = 40; // ancho promedio esperado

  for (let x = 20; x < canvas.width; x += anchoEstimado){

    let img = ctx.getImageData(x, y, 10, 1).data;

    let r=0,g=0,b=0,c=0;

    for (let i=0;i<img.length;i+=4){
      r+=img[i];
      g+=img[i+1];
      b+=img[i+2];
      c++;
    }

    r/=c; g/=c; b/=c;

    let val = detectar([r,g,b]);
    resultado += val;

    // debug
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(x-3,y-3,6,6);
  }

  output.textContent = resultado;

  requestAnimationFrame(scan);
}

video.addEventListener("play", scan);
</script>

</body>
</html>
