<script>
let modo = "generar";

const colores = {
  rojo: [255,0,0],
  verde: [0,255,0],
  azul: [0,0,255],
  negro: [0,0,0],
  blanco: [255,255,255]
};

const coloresHex = {
  rojo: "#ff0000",
  verde: "#00ff00",
  azul: "#0000ff",
  negro: "#000000",
  blanco: "#ffffff"
};

const diccionario = {
  "negro-blanco": "0",
  "negro-rojo": "1",
  "negro-verde": "2",
  "negro-azul": "3",
  "blanco-rojo": "4",
  "blanco-verde": "5",
  "blanco-azul": "6",
  "rojo-verde": "7",
  "rojo-azul": "8",
  "verde-azul": "9"
};

const dicInv = {};
for (let k in diccionario) dicInv[diccionario[k]] = k;

const START = ["blanco","rojo","blanco"];
const END = ["verde","negro","verde"];

// HISTORIAL para predicción
let historial = [];

// ---------------- GENERADOR ----------------
function generar() {
  const texto = document.getElementById("inputText").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let seq = [...START];

  for (let c of texto) {
    if (!dicInv[c]) continue;
    let [a,b] = dicInv[c].split("-");
    seq.push(a,b);
  }

  seq.push(...END);

  const w = 20;

  for (let i=0;i<seq.length;i++){
    ctx.fillStyle = coloresHex[seq[i]];
    ctx.fillRect(i*w,0,w,canvas.height);
  }
}

// ---------------- CAMARA ----------------
async function iniciarCamara(){
  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  requestAnimationFrame(scanFrame);
}

// distancia con peso oscuro
function dist(c1, c2){
  let d = Math.sqrt(
    (c1[0]-c2[0])**2 +
    (c1[1]-c2[1])**2 +
    (c1[2]-c2[2])**2
  );

  // bonus para colores oscuros
  let brillo = (c1[0]+c1[1]+c1[2])/3;
  if (brillo < 80) d *= 0.7;

  return d;
}

// detectar color más cercano
function detectarColor(r,g,b){
  let mejor = null;
  let min = 999999;

  for (let nombre in colores){
    let d = dist([r,g,b], colores[nombre]);
    if (d < min){
      min = d;
      mejor = nombre;
    }
  }

  return mejor;
}

// predicción inteligente
function predecir(){
  let freq = {};

  for (let val of historial){
    freq[val] = (freq[val] || 0) + 1;
  }

  let mejor = "";
  let max = 0;

  for (let k in freq){
    if (freq[k] > max){
      max = freq[k];
      mejor = k;
    }
  }

  return mejor;
}

// ---------------- SCAN ----------------
function scanFrame(){
  if (modo !== "scan") return;

  const video = document.getElementById("video");

  const temp = document.createElement("canvas");
  temp.width = video.videoWidth;
  temp.height = video.videoHeight;
  const ctx = temp.getContext("2d");

  ctx.drawImage(video,0,0);

  // 🔥 ZONA CENTRAL (clave)
  let yStart = temp.height * 0.45;
  let yEnd = temp.height * 0.55;

  let coloresLeidos = [];

  for (let x=0; x<temp.width; x+=8){

    let suma = [0,0,0];
    let count = 0;

    // promedio vertical (reduce ruido)
    for (let y=yStart; y<yEnd; y+=2){
      let d = ctx.getImageData(x,y,1,1).data;
      suma[0]+=d[0];
      suma[1]+=d[1];
      suma[2]+=d[2];
      count++;
    }

    let r = suma[0]/count;
    let g = suma[1]/count;
    let b = suma[2]/count;

    let nombre = detectarColor(r,g,b);

    // filtro anti ruido
    if (
      coloresLeidos.length === 0 ||
      coloresLeidos[coloresLeidos.length-1] !== nombre
    ){
      coloresLeidos.push(nombre);
    }
  }

  let texto = "";

  for (let i=0;i<coloresLeidos.length;i++){
    if (
      coloresLeidos[i] === "blanco" &&
      coloresLeidos[i+1] === "rojo" &&
      coloresLeidos[i+2] === "blanco"
    ){
      let datos = [];

      for (let j=i+3;j<coloresLeidos.length;j++){
        if (
          coloresLeidos[j] === "verde" &&
          coloresLeidos[j+1] === "negro" &&
          coloresLeidos[j+2] === "verde"
        ){
          break;
        }
        datos.push(coloresLeidos[j]);
      }

      for (let k=0;k<datos.length;k+=2){
        let clave = datos[k] + "-" + datos[k+1];
        if (diccionario[clave]){
          texto += diccionario[clave];
        }
      }

      break;
    }
  }

  // guardar historial (máx 20)
  if (texto.length > 0){
    historial.push(texto);
    if (historial.length > 20) historial.shift();
  }

  let pred = predecir();

  document.getElementById("output").innerHTML =
    "📷 Lectura: " + texto +
    "<br><span style='color:#00aaff'>🧠 Predicción: " + pred + "</span>";

  requestAnimationFrame(scanFrame);
}
</script>
