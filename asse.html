<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ColorCode</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  margin: 10px;
  border: 3px solid white;
}

video {
  width: 100vw;
  height: 50vh;
  object-fit: cover;
}

#resultado {
  font-size: 60px;
  color: lime;
  text-shadow: 0 0 20px lime;
}
</style>
</head>
<body>

<h1>ColorCode</h1>

<input id="input" maxlength="6" placeholder="123456">
<br>
<button onclick="generar()">Generar</button>

<br>
<canvas id="code" width="600" height="100"></canvas>

<br>
<video id="video" autoplay playsinline></video>
<br>
<button onclick="startCamera()">Activar cámara</button>

<div id="resultado">----</div>

<script>
const canvas = document.getElementById("code");
const ctx = canvas.getContext("2d");

const colores = [
  "#ffffff", //0
  "#000000", //1
  "#ff0000", //2
  "#00ff00", //3
  "#0000ff", //4
  "#ffff00", //5
  "#00ffff", //6
  "#ff00ff", //7
  "#ff8800", //8
  "#888888"  //9
];

// marcadores
const START = ["#ff0000","#0000ff","#ff0000"];
const END   = ["#ff0000","#00ff00","#ff0000"];

function generar() {
  let val = document.getElementById("input").value;
  if (!/^[0-9]{6}$/.test(val)) {
    alert("Poné 6 números");
    return;
  }

  let sequence = [...START];

  for (let n of val) {
    sequence.push(colores[n]);
  }

  sequence.push(...END);

  let w = canvas.width / sequence.length;

  for (let i=0;i<sequence.length;i++) {
    ctx.fillStyle = sequence[i];
    ctx.fillRect(i*w,0,w,canvas.height);
  }
}

// ================= CAMARA =================

const video = document.getElementById("video");

function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } }
  }).then(stream => video.srcObject = stream);
}

// ================= SCAN =================

const scanCanvas = document.createElement("canvas");
const sctx = scanCanvas.getContext("2d");

setInterval(scan, 300);

function getColor(r,g,b) {
  if (r>200 && g>200 && b>200) return 0;
  if (r<50 && g<50 && b<50) return 1;

  if (r>200 && g<80 && b<80) return 2;
  if (g>200 && r<80 && b<80) return 3;
  if (b>200 && r<80 && g<80) return 4;

  if (r>200 && g>200 && b<80) return 5;
  if (g>200 && b>200 && r<80) return 6;
  if (r>200 && b>200 && g<80) return 7;

  if (r>200 && g>100 && g<200 && b<80) return 8;

  return 9;
}

function scan() {
  if (!video.videoWidth) return;

  scanCanvas.width = video.videoWidth;
  scanCanvas.height = video.videoHeight;

  sctx.drawImage(video,0,0);

  let y = scanCanvas.height / 2;

  let colors = [];

  // leer línea horizontal
  for (let x=0; x<scanCanvas.width; x+=10) {
    let d = sctx.getImageData(x,y,1,1).data;
    colors.push(getColor(d[0],d[1],d[2]));
  }

  // buscar patrón inicio
  for (let i=0; i<colors.length-10; i++) {

    if (colors[i]==2 && colors[i+1]==4 && colors[i+2]==2) {

      let result = [];

      let j = i+3;

      while (j < colors.length-3) {

        // fin
        if (colors[j]==2 && colors[j+1]==3 && colors[j+2]==2) break;

        result.push(colors[j]);
        j++;
      }

      if (result.length >= 6) {
        document.getElementById("resultado").innerText =
          result.slice(0,6).join("");
      }

      break;
    }
  }
}
</script>

</body>
</html>
