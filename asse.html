<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiniCode Scanner</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
  }

  canvas {
    border: 4px solid white;
    margin: 10px;
  }

  video {
    width: 300px;
    border: 3px solid white;
  }

  input {
    padding: 10px;
    font-size: 18px;
    width: 120px;
    text-align: center;
  }

  button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
  }
</style>
</head>
<body>

<h1>MiniCode (tu QR simple)</h1>

<input id="input" maxlength="6" placeholder="123456">
<br>
<button onclick="generar()">Generar</button>

<br>
<canvas id="code" width="200" height="200"></canvas>

<h2>Scanner</h2>
<video id="video" autoplay></video>
<br>
<button onclick="startCamera()">Activar cámara</button>

<p id="resultado"></p>

<script>
const canvas = document.getElementById("code");
const ctx = canvas.getContext("2d");

function generar() {
  let val = document.getElementById("input").value;

  if (!/^[0-9]{6}$/.test(val)) {
    alert("Poné exactamente 6 números");
    return;
  }

  let bits = "";

  for (let num of val) {
    bits += parseInt(num).toString(2).padStart(4, "0");
  }

  draw(bits);
}

function draw(bits) {
  const size = 8; // grilla 8x8
  const cell = canvas.width / size;

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let i = 0;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      // borde negro
      if (x === 0 || y === 0 || x === size-1 || y === size-1) {
        ctx.fillStyle = "black";
      } else {
        if (i < bits.length) {
          ctx.fillStyle = bits[i] === "1" ? "black" : "white";
          i++;
        } else {
          ctx.fillStyle = "white";
        }
      }

      ctx.fillRect(x * cell, y * cell, cell, cell);
    }
  }
}

// ================= SCANNER =================

const video = document.getElementById("video");

function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => video.srcObject = stream);
}

const scanCanvas = document.createElement("canvas");
const scanCtx = scanCanvas.getContext("2d");

setInterval(scan, 500);

function scan() {
  if (!video.videoWidth) return;

  scanCanvas.width = video.videoWidth;
  scanCanvas.height = video.videoHeight;

  scanCtx.drawImage(video, 0, 0);

  let size = 8;
  let bits = "";

  let stepX = scanCanvas.width / size;
  let stepY = scanCanvas.height / size;

  for (let y = 1; y < size-1; y++) {
    for (let x = 1; x < size-1; x++) {

      let px = Math.floor(x * stepX + stepX/2);
      let py = Math.floor(y * stepY + stepY/2);

      let data = scanCtx.getImageData(px, py, 1, 1).data;

      let brightness = (data[0] + data[1] + data[2]) / 3;

      bits += brightness < 128 ? "1" : "0";
    }
  }

  if (bits.length >= 24) {
    let nums = [];

    for (let i = 0; i < 24; i += 4) {
      let chunk = bits.slice(i, i+4);
      nums.push(parseInt(chunk, 2));
    }

    document.getElementById("resultado").innerText =
      "Detectado: " + nums.join("");
  }
}
</script>

</body>
</html>
