<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ColorCode Scanner</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

canvas, video {
  border: 2px solid white;
  margin-top: 10px;
}

button, input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>🎨 ColorCode</h1>

<button onclick="modo='generar'">Generar</button>
<button onclick="modo='scan'; iniciarCamara()">Escanear</button>

<br>

<input id="inputText" placeholder="12345" />

<br>
<button onclick="generar()">Generar código</button>

<br>

<canvas id="canvas" width="800" height="100"></canvas>

<br>

<video id="video" width="400" height="200" autoplay></video>

<p id="output"></p>

<script>
let modo = "generar";

const colores = {
  rojo: [255,0,0],
  verde: [0,255,0],
  azul: [0,0,255],
  negro: [0,0,0],
  blanco: [255,255,255]
};

const coloresHex = {
  rojo: "#ff0000",
  verde: "#00ff00",
  azul: "#0000ff",
  negro: "#000000",
  blanco: "#ffffff"
};

const diccionario = {
  "negro-blanco": "0",
  "negro-rojo": "1",
  "negro-verde": "2",
  "negro-azul": "3",
  "blanco-rojo": "4",
  "blanco-verde": "5",
  "blanco-azul": "6",
  "rojo-verde": "7",
  "rojo-azul": "8",
  "verde-azul": "9"
};

const dicInv = {};
for (let k in diccionario) dicInv[diccionario[k]] = k;

const START = ["blanco","rojo","blanco"];
const END = ["verde","negro","verde"];

// ---------------- GENERADOR ----------------
function generar() {
  const texto = document.getElementById("inputText").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let seq = [...START];

  for (let c of texto) {
    if (!dicInv[c]) continue;
    let [a,b] = dicInv[c].split("-");
    seq.push(a,b);
  }

  seq.push(...END);

  const w = 20;

  for (let i=0;i<seq.length;i++){
    ctx.fillStyle = coloresHex[seq[i]];
    ctx.fillRect(i*w,0,w,canvas.height);
  }
}

// ---------------- CAMARA ----------------
async function iniciarCamara(){
  const video = document.getElementById("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  requestAnimationFrame(scanFrame);
}

// distancia de color
function dist(c1, c2){
  return Math.sqrt(
    (c1[0]-c2[0])**2 +
    (c1[1]-c2[1])**2 +
    (c1[2]-c2[2])**2
  );
}

// encontrar color más cercano
function detectarColor(r,g,b){
  let mejor = null;
  let min = 999999;

  for (let nombre in colores){
    let d = dist([r,g,b], colores[nombre]);
    if (d < min){
      min = d;
      mejor = nombre;
    }
  }

  return mejor;
}

// ---------------- SCAN ----------------
function scanFrame(){
  if (modo !== "scan") return;

  const video = document.getElementById("video");

  const temp = document.createElement("canvas");
  temp.width = video.videoWidth;
  temp.height = video.videoHeight;
  const ctx = temp.getContext("2d");

  ctx.drawImage(video,0,0);

  let y = temp.height / 2;

  let coloresLeidos = [];

  // leemos línea horizontal
  for (let x=0; x<temp.width; x+=10){
    let data = ctx.getImageData(x,y,1,1).data;
    let nombre = detectarColor(data[0],data[1],data[2]);

    if (coloresLeidos.length === 0 || coloresLeidos[coloresLeidos.length-1] !== nombre){
      coloresLeidos.push(nombre);
    }
  }

  // buscar inicio y fin
  let texto = "";

  for (let i=0;i<coloresLeidos.length;i++){
    if (
      coloresLeidos[i] === "blanco" &&
      coloresLeidos[i+1] === "rojo" &&
      coloresLeidos[i+2] === "blanco"
    ){
      let datos = [];

      for (let j=i+3;j<coloresLeidos.length;j++){
        if (
          coloresLeidos[j] === "verde" &&
          coloresLeidos[j+1] === "negro" &&
          coloresLeidos[j+2] === "verde"
        ){
          break;
        }
        datos.push(coloresLeidos[j]);
      }

      // decodificar
      for (let k=0;k<datos.length;k+=2){
        let clave = datos[k] + "-" + datos[k+1];
        if (diccionario[clave]){
          texto += diccionario[clave];
        }
      }

      break;
    }
  }

  document.getElementById("output").innerText = "📷 " + texto;

  requestAnimationFrame(scanFrame);
}
</script>

</body>
</html>
