<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiniCode PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

h1 {
  margin: 10px;
}

input {
  padding: 12px;
  font-size: 20px;
  width: 160px;
  text-align: center;
}

button {
  padding: 10px;
  font-size: 18px;
  margin: 5px;
}

#container {
  position: relative;
}

video {
  width: 100vw;
  height: 60vh;
  object-fit: cover;
}

#overlay {
  position: absolute;
  top: 0;
  left: 0;
}

#resultado {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: bold;
  color: lime;
  text-shadow: 0 0 20px lime;
}

canvas#code {
  width: 300px;
  border: 4px solid white;
  margin: 10px;
}
</style>
</head>
<body>

<h1>MiniCode PRO</h1>

<input id="input" maxlength="6" placeholder="123456">
<br>
<button onclick="generar()">Generar</button>

<br>
<canvas id="code" width="300" height="300"></canvas>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="overlay"></canvas>
  <div id="resultado">----</div>
</div>

<button onclick="startCamera()">Activar cámara</button>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const octx = overlay.getContext("2d");

const codeCanvas = document.getElementById("code");
const ctx = codeCanvas.getContext("2d");

// ================= GENERADOR =================

function generar() {
  let val = document.getElementById("input").value;

  if (!/^[0-9]{6}$/.test(val)) {
    alert("Poné 6 números");
    return;
  }

  let bits = "";
  for (let n of val) {
    bits += parseInt(n).toString(2).padStart(4, "0");
  }

  draw(bits);
}

function draw(bits) {
  let size = 8;
  let cell = codeCanvas.width / size;

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, 300, 300);

  let i = 0;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      if (x===0||y===0||x===7||y===7) {
        ctx.fillStyle = "black";
      } else {
        ctx.fillStyle = bits[i] === "1" ? "black" : "white";
        i++;
      }

      ctx.fillRect(x*cell, y*cell, cell, cell);
    }
  }
}

// ================= CÁMARA =================

function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } }
  }).then(stream => {
    video.srcObject = stream;
  });
}

// ================= SCANNER =================

let history = [];

setInterval(scan, 200);

function scan() {
  if (!video.videoWidth) return;

  overlay.width = video.videoWidth;
  overlay.height = video.videoHeight;

  octx.clearRect(0,0,overlay.width,overlay.height);

  let size = Math.min(overlay.width, overlay.height) * 0.5;
  let startX = (overlay.width - size)/2;
  let startY = (overlay.height - size)/2;

  let grid = 8;
  let step = size / grid;

  // 🔲 dibujar marco visual
  octx.strokeStyle = "lime";
  octx.lineWidth = 3;
  octx.strokeRect(startX, startY, size, size);

  let bits = "";

  for (let y=1; y<grid-1; y++) {
    for (let x=1; x<grid-1; x++) {

      let px = Math.floor(startX + x*step);
      let py = Math.floor(startY + y*step);

      // dibujar punto
      octx.fillStyle = "red";
      octx.fillRect(px-2, py-2, 4, 4);

      let temp = document.createElement("canvas");
      temp.width = video.videoWidth;
      temp.height = video.videoHeight;
      let tctx = temp.getContext("2d");

      tctx.drawImage(video,0,0);

      let total = 0;

      for (let dx=-2; dx<=2; dx++) {
        for (let dy=-2; dy<=2; dy++) {
          let d = tctx.getImageData(px+dx, py+dy,1,1).data;
          total += (d[0]+d[1]+d[2])/3;
        }
      }

      let avg = total/25;
      bits += avg < 128 ? "1" : "0";
    }
  }

  if (bits.length === 24) {

    let nums = [];
    let valid = true;

    for (let i=0;i<24;i+=4) {
      let n = parseInt(bits.slice(i,i+4),2);
      if (n>9) valid=false;
      nums.push(n);
    }

    if (!valid) return;

    let result = nums.join("");

    history.push(result);
    if (history.length > 5) history.shift();

    let count = history.filter(x=>x===result).length;

    if (count >= 3) {
      document.getElementById("resultado").innerText = result;
    }
  }
}
</script>

</body>
</html>
