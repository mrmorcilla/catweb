<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scanner Color v2</title>
<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }
  video, canvas {
    margin-top: 10px;
    border: 2px solid white;
  }
</style>
</head>
<body>

<h2>📷 Scanner de barras de colores</h2>
<video id="video" width="400" height="200" autoplay></video>
<canvas id="canvas" width="400" height="200"></canvas>

<p>Resultado: <span id="output">...</span></p>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const output = document.getElementById("output");

// 🎨 COLORES BASE (ajustables)
const colores = [
  { n: 0, c: [0,0,0] },       // negro
  { n: 1, c: [255,255,255] }, // blanco
  { n: 2, c: [255,0,0] },     // rojo
  { n: 3, c: [0,255,0] },     // verde
  { n: 4, c: [0,0,255] },     // azul
  { n: 5, c: [255,255,0] },   // amarillo
  { n: 6, c: [0,255,255] },   // celeste
  { n: 7, c: [255,0,255] }    // magenta
];

// 📏 CONFIG
const NUM_BARRAS = 6;
const SCAN_HEIGHT_RATIO = 0.5; // línea al medio
const SAMPLE_WIDTH_RATIO = 0.6; // evita bordes

// 📷 Cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// 🎯 Distancia de color
function dist(c1, c2) {
  return Math.sqrt(
    (c1[0]-c2[0])**2 +
    (c1[1]-c2[1])**2 +
    (c1[2]-c2[2])**2
  );
}

// 🎯 Detectar número más cercano
function detectarColor(rgb) {
  let min = Infinity;
  let elegido = "?";

  for (let col of colores) {
    let d = dist(rgb, col.c);
    if (d < min) {
      min = d;
      elegido = col.n;
    }
  }

  return elegido;
}

// 🔍 Escaneo
function scan() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let y = canvas.height * SCAN_HEIGHT_RATIO;

  // 🟥 línea guía
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, y);
  ctx.lineTo(canvas.width, y);
  ctx.stroke();

  let anchoBarra = canvas.width / NUM_BARRAS;
  let resultado = "";

  for (let i = 0; i < NUM_BARRAS; i++) {

    // 📍 centro de cada barra (clave)
    let x = i * anchoBarra + anchoBarra / 2;

    // 🧪 pequeño muestreo (evita mezcla)
    let sampleWidth = anchoBarra * SAMPLE_WIDTH_RATIO;
    let startX = x - sampleWidth / 2;

    let img = ctx.getImageData(startX, y, sampleWidth, 1).data;

    let r=0,g=0,b=0,count=0;

    for (let j = 0; j < img.length; j += 4) {
      r += img[j];
      g += img[j+1];
      b += img[j+2];
      count++;
    }

    r /= count;
    g /= count;
    b /= count;

    let numero = detectarColor([r,g,b]);
    resultado += numero;

    // 🟩 debug visual
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(x-5, y-5, 10, 10);
  }

  output.textContent = resultado;

  requestAnimationFrame(scan);
}

video.addEventListener("play", scan);
</script>

</body>
</html>
