<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiniCode Scanner PRO</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: #000;
    color: white;
  }

  h1 {
    margin: 10px;
  }

  input {
    padding: 12px;
    font-size: 20px;
    width: 160px;
    text-align: center;
  }

  button {
    padding: 12px;
    font-size: 18px;
    margin: 5px;
  }

  canvas {
    width: 90vw;
    max-width: 400px;
    height: auto;
    border: 4px solid white;
  }

  video {
    width: 100vw;
    height: auto;
    max-height: 60vh;
    object-fit: cover;
  }

  #resultado {
    font-size: 24px;
    margin: 10px;
  }
</style>
</head>
<body>

<h1>MiniCode</h1>

<input id="input" maxlength="6" placeholder="123456">
<br>
<button onclick="generar()">Generar</button>

<br>
<canvas id="code" width="400" height="400"></canvas>

<h2>Scanner</h2>
<video id="video" autoplay playsinline></video>
<br>
<button onclick="startCamera()">Activar cámara</button>

<p id="resultado"></p>

<script>
const canvas = document.getElementById("code");
const ctx = canvas.getContext("2d");

// ================= GENERADOR =================

function generar() {
  let val = document.getElementById("input").value;

  if (!/^[0-9]{6}$/.test(val)) {
    alert("Poné exactamente 6 números");
    return;
  }

  let bits = "";

  for (let num of val) {
    bits += parseInt(num).toString(2).padStart(4, "0");
  }

  draw(bits);
}

function draw(bits) {
  const size = 8;
  const cell = canvas.width / size;

  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let i = 0;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {

      // borde grueso
      if (x === 0 || y === 0 || x === size-1 || y === size-1) {
        ctx.fillStyle = "black";
      } else {
        if (i < bits.length) {
          ctx.fillStyle = bits[i] === "1" ? "black" : "white";
          i++;
        } else {
          ctx.fillStyle = "white";
        }
      }

      ctx.fillRect(x * cell, y * cell, cell, cell);
    }
  }
}

// ================= SCANNER =================

const video = document.getElementById("video");

function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: "environment" }
    }
  })
  .then(stream => video.srcObject = stream)
  .catch(() => alert("No se pudo acceder a la cámara"));
}

const scanCanvas = document.createElement("canvas");
const scanCtx = scanCanvas.getContext("2d");

setInterval(scan, 300);

let lastResults = [];

function scan() {
  if (!video.videoWidth) return;

  scanCanvas.width = video.videoWidth;
  scanCanvas.height = video.videoHeight;

  scanCtx.drawImage(video, 0, 0);

  let boxSize = Math.min(scanCanvas.width, scanCanvas.height) * 0.5;
  let startX = (scanCanvas.width - boxSize) / 2;
  let startY = (scanCanvas.height - boxSize) / 2;

  let size = 8;
  let bits = "";
  let step = boxSize / size;

  // 🧠 1. verificar borde negro
  let borderCheck = 0;
  let borderTotal = 0;

  for (let i = 0; i < size; i++) {
    let px = Math.floor(startX + i * step + step/2);
    let pyTop = Math.floor(startY + step/2);
    let pyBottom = Math.floor(startY + (size-1)*step + step/2);

    let top = scanCtx.getImageData(px, pyTop, 1, 1).data;
    let bottom = scanCtx.getImageData(px, pyBottom, 1, 1).data;

    let bt = (top[0]+top[1]+top[2])/3;
    let bb = (bottom[0]+bottom[1]+bottom[2])/3;

    if (bt < 100) borderCheck++;
    if (bb < 100) borderCheck++;

    borderTotal += 2;
  }

  let borderRatio = borderCheck / borderTotal;

  // ❌ si no hay borde claro → no escanear
  if (borderRatio < 0.6) return;

  // 🧠 2. leer datos con promedio
  for (let y = 1; y < size-1; y++) {
    for (let x = 1; x < size-1; x++) {

      let px = Math.floor(startX + x * step);
      let py = Math.floor(startY + y * step);

      let total = 0;
      let count = 0;

      for (let dx = -2; dx <= 2; dx++) {
        for (let dy = -2; dy <= 2; dy++) {

          let data = scanCtx.getImageData(px+dx, py+dy, 1, 1).data;
          let brightness = (data[0]+data[1]+data[2])/3;

          total += brightness;
          count++;
        }
      }

      let avg = total / count;
      bits += avg < 128 ? "1" : "0";
    }
  }

  // 🧠 3. decodificar con validación
  if (bits.length >= 24) {
    let nums = [];
    let valid = true;

    for (let i = 0; i < 24; i += 4) {
      let chunk = bits.slice(i, i+4);
      let num = parseInt(chunk, 2);

      if (num > 9) {
        valid = false;
        break;
      }

      nums.push(num);
    }

    if (!valid) return;

    let result = nums.join("");

    // 🧠 4. estabilidad (anti ruido)
    lastResults.push(result);
    if (lastResults.length > 5) lastResults.shift();

    let iguales = lastResults.filter(r => r === result).length;

    if (iguales >= 3) {
      document.getElementById("resultado").innerText =
        "Detectado: " + result;
    }
  }
}
</script>

</body>
</html>
