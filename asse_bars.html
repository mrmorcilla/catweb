<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barcode Tool</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}
input, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}
svg, video {
    margin-top: 15px;
    border: 2px solid white;
}
</style>
</head>
<body>

<h1>Barcode Creator & Scanner</h1>

<h2>Crear código</h2>
<input id="text" placeholder="Texto o números">
<button onclick="crear()">Generar</button>
<br>
<svg id="barcode"></svg>

<h2>Escanear código</h2>
<button onclick="iniciarCamara()">Iniciar cámara</button>
<br>
<video id="video" width="300" height="200" autoplay muted playsinline></video>
<p id="resultado"></p>

<script>
function crear() {
    const texto = document.getElementById("text").value;
    if (!texto) return;

    JsBarcode("#barcode", texto, {
        format: "CODE128",
        lineColor: "#000",
        background: "#fff",
        width: 2,
        height: 100
    });
}

let codeReader;

async function iniciarCamara() {
    const video = document.getElementById("video");
    const resultado = document.getElementById("resultado");

    try {
        // 🔑 Pedir cámara trasera directamente
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } }
        });

        video.srcObject = stream;

        codeReader = new ZXing.BrowserMultiFormatReader();

        codeReader.decodeFromVideoElement(video, (result, err) => {
            if (result) {
                resultado.textContent = "Resultado: " + result.text;
            }
        });

    } catch (err) {
        console.error(err);

        if (location.protocol !== "https:" && location.hostname !== "localhost") {
            resultado.textContent = "⚠️ Necesitas HTTPS o localhost";
        } else {
            resultado.textContent = "❌ Permiso de cámara denegado o no disponible";
        }
    }
}
</script>

</body>
</html>
