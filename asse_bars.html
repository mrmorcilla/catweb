<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barcode Pro Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1"></script>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

input, button {
    padding: 10px;
    margin: 10px;
}

#container {
    position: relative;
    display: inline-block;
}

video {
    border: 2px solid white;
}

/* 🔴 Línea de escaneo */
#scanLine {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 3px;
    background: red;
    box-shadow: 0 0 10px red;
    transform-origin: center;
}

/* 📦 Caja de detección */
#box {
    position: absolute;
    border: 2px solid lime;
    pointer-events: none;
}

#resultado {
    margin-top: 10px;
    font-size: 18px;
    color: #0f0;
}
</style>
</head>
<body>

<h1>Barcode Creator & Scanner</h1>

<h2>Crear</h2>
<input id="text" placeholder="Texto">
<button onclick="crear()">Generar</button><br>
<svg id="barcode"></svg>

<h2>Escanear</h2>
<button onclick="iniciarCamara()">Iniciar cámara</button>

<div id="container">
    <video id="video" width="320" height="240" autoplay muted playsinline></video>
    <div id="scanLine"></div>
    <div id="box"></div>
</div>

<p id="resultado">Esperando escaneo...</p>

<script>
function crear() {
    const texto = document.getElementById("text").value;
    if (!texto) return;

    JsBarcode("#barcode", texto, {
        format: "CODE128",
        lineColor: "#000",
        background: "#fff",
        width: 2,
        height: 100
    });
}

let codeReader;

async function iniciarCamara() {
    const video = document.getElementById("video");
    const resultado = document.getElementById("resultado");
    const box = document.getElementById("box");
    const scanLine = document.getElementById("scanLine");

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } }
        });

        video.srcObject = stream;

        codeReader = new ZXing.BrowserMultiFormatReader();

        codeReader.decodeFromVideoElement(video, (result, err) => {

            // 🔄 Feedback en tiempo real
            resultado.textContent = "Escaneando...";

            if (result) {
                resultado.textContent = "✅ " + result.text;

                // 📦 Dibujar caja
                if (result.resultPoints) {
                    let points = result.resultPoints;

                    let minX = Math.min(...points.map(p => p.x));
                    let maxX = Math.max(...points.map(p => p.x));
                    let minY = Math.min(...points.map(p => p.y));
                    let maxY = Math.max(...points.map(p => p.y));

                    box.style.left = minX + "px";
                    box.style.top = minY + "px";
                    box.style.width = (maxX - minX) + "px";
                    box.style.height = (maxY - minY) + "px";

                    // 📐 Rotación de la línea (según inclinación)
                    if (points.length >= 2) {
                        let dx = points[1].x - points[0].x;
                        let dy = points[1].y - points[0].y;
                        let angle = Math.atan2(dy, dx) * 180 / Math.PI;

                        scanLine.style.transform = `rotate(${angle}deg)`;
                    }
                }
            }
        });

    } catch (err) {
        console.error(err);
        resultado.textContent = "❌ Error con la cámara";
    }
}
</script>

</body>
</html>
