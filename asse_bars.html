<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barcode Tool</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}
input, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}
canvas, video {
    margin-top: 15px;
    border: 2px solid white;
}
</style>
</head>
<body>

<h1>Barcode Creator & Scanner</h1>

<h2>Crear código</h2>
<input id="text" placeholder="Escribí números o texto">
<button onclick="crear()">Generar</button>
<br>
<svg id="barcode"></svg>

<h2>Escanear código</h2>
<button onclick="iniciarCamara()">Iniciar cámara</button>
<br>
<video id="video" width="300" height="200"></video>
<p id="resultado"></p>

<script>
function crear() {
    let texto = document.getElementById("text").value;
    JsBarcode("#barcode", texto, {
        format: "CODE128",
        lineColor: "#000",
        background: "#fff",
        width: 2,
        height: 100
    });
}

let codeReader;

function iniciarCamara() {
    const video = document.getElementById("video");
    const resultado = document.getElementById("resultado");

    codeReader = new ZXing.BrowserBarcodeReader();

    codeReader.decodeFromVideoDevice(null, video, (result, err) => {
        if (result) {
            resultado.textContent = "Resultado: " + result.text;
        }
    });
}
</script>

</body>
</html>
